spring:
  datasource:
    url: jdbc:h2:mem:pizzariatest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect:
          postgres:
            pgcrypto:
              regconfig: false

  # Desabilita auto-configure do Kafka nos testes de integracao
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  # Desabilita envio de e-mail nos testes
  mail:
    host: localhost
    port: 25

management:
  health:
    mail:
      enabled: false

# -------------------------------------------------------
# JWT — valores dummy para testes (nao usados em producao)
# -------------------------------------------------------
jwt:
  # Chave HMAC-SHA256: minimo 32 bytes (256 bits) em Base64
  secret: dGVzdGUtc2VjcmV0LWtleS1waXp6YXJpYS1qdW5pdC0yMDI2
  # Expiracao: 1 hora em milissegundos
  expiration: 3600000
