spring:
  datasource:
    url: jdbc:h2:mem:pizzariatest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        # database-platform e hibernate.dialect omitidos: Hibernate 7 detecta H2 automaticamente
        # (remove WARN HHH90000025: H2Dialect does not need to be specified explicitly)

  # Desabilita auto-configure do Kafka nos testes de integração
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  # Desabilita envio de e-mail nos testes
  mail:
    host: localhost
    port: 25

management:
  health:
    mail:
      enabled: false

# -------------------------------------------------------
# JWT — valores dummy para testes (não usados em produção)
# -------------------------------------------------------
jwt:
  # Chave HMAC-SHA256: mínimo 32 bytes (256 bits) em Base64
  secret: dGVzdGUtc2VjcmV0LWtleS1waXp6YXJpYS1qdW5pdC0yMDI2
  # Expiração: 1 hora em milissegundos
  expiration: 3600000
