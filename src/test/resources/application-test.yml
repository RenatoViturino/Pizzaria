spring:
  datasource:
    url: jdbc:h2:mem:pizzariatest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    # Fix: usar H2Dialect puro, sem dialect do PostgreSQL no profile de teste
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        # Fix: desabilita comandos DDL exclusivos do PostgreSQL (ex: SET client_min_messages)
        dialect:
          postgres:
            pgcrypto:
              regconfig: false

  # Desabilita auto-configure do Kafka nos testes de integração
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  # Desabilita envio de e-mail nos testes
  mail:
    host: localhost
    port: 25

management:
  health:
    mail:
      enabled: false
