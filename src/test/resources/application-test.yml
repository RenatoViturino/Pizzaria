spring:
  datasource:
    url: jdbc:h2:mem:pizzariatest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Desabilita auto-configure do Kafka nos testes de integração
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  # Desabilita envio de e-mail nos testes
  mail:
    host: localhost
    port: 25

management:
  health:
    mail:
      enabled: false
